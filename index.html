<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#2f2d33;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.login-box{
    width:350px;
}
h1,label{
    color:#fff;
}
input{
    width:100%;
    padding:15px;
    margin:10px 0;
    background:#3a383e;
    border:2px solid #555;
    border-radius:10px;
    color:#fff;
}
button{
    width:100%;
    padding:15px;
    background:#FFC107;
    border:none;
    border-radius:40px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="login-box">
    <h1>Sign In</h1>

    <label>Username</label>
    <input type="text">

    <label>Password</label>
    <input type="password">

    <button>Sign In</button>
</div>

</body>
</html>
