<!DOCTYPE html>
<html>
<head>
<title>Cartypanel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Cartypanel</h2>

<a onclick="showPage('dashboard')">Dashboard</a>

</div>


<div class="main">

<div id="content">

<h1>Welcome Dashboard</h1>

<div class="cards">

</div>

<div class="box">

</div>

<h1>0</h1>
</div>

</div>

</div>

</div>

<h2>Wallet</h2>

<input placeholder="Enter amount">

<button>Add Fund</button>

</div>

<h2>Settings</h2>

<select>
<option>Dark Theme</option>
<option>Light Theme</option>
<option>Blue Theme</option>
<option>Green Theme</option>
</select>


<select>

</div>

</html>
